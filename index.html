<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cosmos.github.io/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive 3D universe simulation with scale-accurate solar system, orbital mechanics, and deep-space navigation." />
    <title>Cosmos Simulator</title>
    <style>
      /* Inline loading screen – rendered before any JS loads */
      #loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #030508;
        font-family: 'Courier New', monospace;
        color: #64748b;
        transition: opacity 0.6s ease;
      }
      #loader.fade-out { opacity: 0; pointer-events: none; }
      #loader .spinner {
        width: 40px; height: 40px;
        border: 2px solid rgba(56,189,248,0.15);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      #loader p { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/cosmos.github.io/assets/index-B9-HEy1c.js"></script>
    <link rel="stylesheet" crossorigin href="/cosmos.github.io/assets/index-dXduo4Mv.css">
  </head>
  <body>
    <!-- Loading screen: visible instantly, hidden when React mounts -->
    <div id="loader">
      <div class="spinner"></div>
      <p>Initializing Cosmos Engine...</p>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader once React has rendered into #root
      const observer = new MutationObserver(() => {
        if (document.getElementById('root')?.children.length > 0) {
          const loader = document.getElementById('loader');
          if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 700); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
